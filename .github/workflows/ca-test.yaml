name: Cluster Autoscaler

on:
  push:
    paths:
      - 'cluster-autoscaler/**'
  pull_request:
    paths:
      - 'cluster-autoscaler/**'

env:
  GOPATH: ${{ github.workspace }}/go

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: ${{ env.GOPATH }}/src/k8s.io/autoscaler

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: |
             ${{ env.GOPATH}}/src/k8s.io/autoscaler/cluster-autoscaler/go.sum

      - name: Apt-get
        run: sudo apt-get install libseccomp-dev -qq

      - name: Test
        working-directory: ${{ env.GOPATH }}/src/k8s.io/autoscaler/cluster-autoscaler
        run: make test-ci
        env:
          GO111MODULE: auto
          PROJECT_NAMES: ""
